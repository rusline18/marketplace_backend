services:
  backend:
    build:
      context: .
    container_name: marketplace_backend
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-marketplace}
      - DB_USERNAME=${DB_USERNAME:-marketplace}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ELASTICSEARCH_HOST=elasticsearch
      - ELASTICSEARCH_PORT=9200
    depends_on:
      - db
      - redis
      - elasticsearch

  nginx:
    image: nginx:alpine
    container_name: marketplace_nginx
    ports:
      - "${NGINX_PORT:-8000}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

  db:
    image: postgres:16-alpine
    container_name: marketplace_db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_DATABASE:-marketplace}
      - POSTGRES_USER=${DB_USERNAME:-marketplace}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-secret}
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: marketplace_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: marketplace_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

volumes:
  db_data:
  redis_data:
  elasticsearch_data:
