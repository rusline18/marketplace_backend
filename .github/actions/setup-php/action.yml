name: Setup PHP
description: Installs and configures the PHP runtime used by this repository's CI jobs.

inputs:
  php-version:
    description: PHP version to install
    required: false
    default: '8.3'
  extensions:
    description: Comma-separated list of PHP extensions to install
    required: false
    default: mbstring, pdo_sqlite, sqlite3, bcmath, gd, zip, intl

runs:
  using: composite
  steps:
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ inputs.php-version }}
        extensions: ${{ inputs.extensions }}
        tools: composer:v2
        coverage: none
