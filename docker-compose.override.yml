services:
  backend:
    build:
      target: dev
    env_file:
      - .env
    volumes:
      - .:/var/www/html
    environment:
      - APP_ENV=local

  nginx:
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf

  db:
    ports:
      - "${DB_PORT:-5432}:5432"

  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"

  elasticsearch:
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"

  db_test:
    image: postgres:16-alpine
    container_name: marketplace_db_test
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_TEST_DATABASE:-marketplace_test}
      - POSTGRES_USER=${DB_TEST_USERNAME:-marketplace}
      - POSTGRES_PASSWORD=${DB_TEST_PASSWORD:-secret}
    ports:
      - "${DB_TEST_PORT:-5433}:5432"
    tmpfs:
      - /var/lib/postgresql/data
